{% set versions = {
    "2.6.0": "3055",
    "2.5.0": "3042"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

{% set root = root if root else "0" %}
build:
  number: 0
  string: "root{{ root.replace('.', '') }}"

package:
  name: {{ environ.get('ANACONDA_PACKAGE', "fastnlo")|string|lower }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  git_url: "https://gitlab.etp.kit.edu/qcd-public/fastNLO"
  git_rev: {{ versions.get(version, "HEAD") }}

requirements:
  build:
    - root {{ root }}.*
    - root-guard

    - automake
    - autoconf
    - libtool
    - pkg-config
    - make
    - m4
    - gnuconfig
    - sed        # build.sh's `sed -i` needs GNU semantics; BSD sed on macOS differs

  host:
    - root {{ root }}.*
    - root-guard
    - lhapdf
    - hoppet ==1.2.0            # needs the pre-2.0 hoppet_v1.h/libhoppet_v1.a API
    - fastjet
    - qcdnum

    - yoda ==1.9.9              # the only yoda<2 build published for linux-aarch64

    - zlib
    - swig

  run:
    - root {{ root }}.*
    - root-guard

    - lhapdf
    - hoppet ==1.2.0            # needs the pre-2.0 hoppet_v1.h/libhoppet_v1.a API
    - fastjet
    - qcdnum

    - yoda ==1.9.9              # the only yoda<2 build published for linux-aarch64
    - zlib

about:
  home: "https://fastnlo.hepforge.org"
  license: "GPL-3.0"
  summary: "FastNLO: fast pQCD calculations for hadron-induced processes"
  description: |
        The fastNLO project provides computer code to create and evaluate fast interpolation tables of pre-computed coefficients in perturbation theory for observables in hadron-induced processes.

extra:
  recipe-maintainers:
    - meiyasan
